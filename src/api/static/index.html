<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --text: #e0e0e0;
    --text-dim: #8888aa;
    --accent: #e94560;
    --accent2: #533483;
    --border: #2a2a4a;
    --green: #4ecca3;
    --tool-bg: #1c1c3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .header .session-badge {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .user-info {
    font-size: 12px;
    color: var(--text-dim);
  }
  .btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--accent2); }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
  }
  .btn-accent:hover { background: #c73750; }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 10px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message-user {
    align-self: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .message-assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .message-assistant code {
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 13px;
  }
  .message-assistant pre {
    background: var(--bg);
    padding: 10px 14px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
  }
  .message-assistant pre code {
    background: none;
    padding: 0;
  }
  .message-error {
    align-self: center;
    background: #3a1a1a;
    border: 1px solid #6a3030;
    color: #ff8888;
    font-size: 13px;
  }

  /* Tool activity */
  .tool-activity {
    align-self: flex-start;
    max-width: 85%;
  }
  .tool-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--tool-bg);
    border-radius: 4px;
    margin-bottom: 3px;
  }
  .tool-icon { font-size: 13px; }
  .tool-name { color: var(--green); font-weight: 500; }
  .tool-detail {
    color: var(--text-dim);
    max-width: 500px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Streaming indicator */
  .streaming-indicator {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .streaming-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Input area */
  .input-area {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 200px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text-dim); }
  .send-btn {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .send-btn:hover { background: #c73750; }
  .send-btn:disabled {
    background: var(--surface2);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  /* Login screen */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 24px;
  }
  .login-screen h1 { font-size: 28px; }
  .login-screen p { color: var(--text-dim); font-size: 14px; }
  .login-btn {
    background: white;
    color: #333;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: box-shadow 0.15s;
  }
  .login-btn:hover { box-shadow: 0 2px 12px rgba(255,255,255,0.15); }

  /* Cost badge */
  .cost-badge {
    display: inline-block;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg);
    padding: 2px 7px;
    border-radius: 3px;
    margin-top: 6px;
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen" style="display:none">
  <h1>Claude Code</h1>
  <p>Sign in to start a session</p>
  <button class="login-btn" onclick="login()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>
</div>

<!-- Chat Screen -->
<div id="chat-screen" style="display:none">
  <div class="header">
    <div class="header-left">
      <h1>Claude Code</h1>
      <span id="session-badge" class="session-badge"></span>
    </div>
    <div class="header-right">
      <span id="user-info" class="user-info"></span>
      <button class="btn" onclick="newSession()">New Session</button>
      <button class="btn" onclick="logout()">Sign Out</button>
    </div>
  </div>
  <div id="chat" class="chat-container"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Send a message..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" class="send-btn" onclick="send()">Send</button>
  </div>
</div>

<script>
// --- Configuration ---
// Supabase project (same as GardenFS)
const SUPABASE_URL = 'https://fmkytgctlrjdvpiusuhv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZta3l0Z2N0bHJqZHZwaXVzdWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNzA4OTIsImV4cCI6MjA4Njg0Njg5Mn0.ykFBKGkQhUqTcei5QzWGESaYgmQlfJ7F5k7jgZA2ZjM';

// API base — configurable via query param ?api=https://... for when the
// frontend is hosted separately (e.g. Vercel) from the bot (e.g. Fly).
// Falls back to same origin when served directly by the bot.
const API_BASE = new URLSearchParams(window.location.search).get('api')
  || window.location.origin;

// --- State ---
let supabase;
let session = null;
let isStreaming = false;
let currentSessionId = null;

// --- Init ---
document.addEventListener('DOMContentLoaded', async () => {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Check for existing session
  const { data } = await supabase.auth.getSession();
  if (data.session) {
    session = data.session;
    showChat();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }

  // Listen for auth state changes (handles OAuth redirect)
  supabase.auth.onAuthStateChange((event, newSession) => {
    if (event === 'SIGNED_IN' && newSession) {
      session = newSession;
      showChat();
    } else if (event === 'SIGNED_OUT') {
      session = null;
      showLogin();
    }
  });
});

// --- Auth ---
async function login() {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/web' }
  });
}

async function logout() {
  await supabase.auth.signOut();
  session = null;
  showLogin();
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('chat-screen').style.display = 'none';
}

function showChat() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  const user = session.user;
  document.getElementById('user-info').textContent =
    user.user_metadata?.full_name || user.email;
  updateSessionBadge();
  document.getElementById('input').focus();
}

function updateSessionBadge() {
  const el = document.getElementById('session-badge');
  el.textContent = currentSessionId
    ? 'session: ' + currentSessionId.slice(0, 8) + '...'
    : 'new session';
}

// --- Chat ---
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  autoResize(input);
  addMessage(text, 'user');

  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  // Refresh token if needed
  const { data } = await supabase.auth.getSession();
  if (data.session) session = data.session;

  const token = session?.access_token;
  if (!token) {
    addMessage('Session expired. Please sign in again.', 'error');
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    return;
  }

  // Create tool activity container and streaming indicator
  const toolContainer = createToolContainer();
  const indicator = addStreamingIndicator();
  let responseText = '';
  let responseMeta = null;

  try {
    const resp = await fetch(API_BASE + '/web/chat', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: text,
        session_id: currentSessionId,
      }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(err || resp.statusText);
    }

    // Read SSE stream
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          const data = JSON.parse(line.slice(6));
          handleSSEEvent(eventType, data, toolContainer);
          if (eventType === 'delta') {
            responseText += data.content || '';
          } else if (eventType === 'done') {
            responseMeta = data;
            responseText = data.content || responseText;
          } else if (eventType === 'error') {
            responseText = data.content || 'Unknown error';
          }
          eventType = null;
        }
      }
    }
  } catch (err) {
    addMessage('Error: ' + err.message, 'error');
  }

  // Remove streaming indicator
  indicator?.remove();

  // Remove tool container if empty
  if (toolContainer && !toolContainer.children.length) {
    toolContainer.remove();
  }

  // Add final response
  if (responseText) {
    const msgEl = addMessage(responseText, 'assistant');
    if (responseMeta) {
      currentSessionId = responseMeta.session_id || currentSessionId;
      updateSessionBadge();
      if (responseMeta.cost > 0) {
        const badge = document.createElement('div');
        badge.className = 'cost-badge';
        badge.textContent = '$' + responseMeta.cost.toFixed(4) +
          ' | ' + (responseMeta.duration_ms / 1000).toFixed(1) + 's';
        msgEl.appendChild(badge);
      }
    }
  }

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}

function handleSSEEvent(type, data, toolContainer) {
  if (type === 'tool') {
    addToolItem(toolContainer, data.name, data.detail);
  } else if (type === 'reasoning') {
    addToolItem(toolContainer, 'thinking', data.content, true);
  }
  // delta and done are handled in the main loop
}

// --- DOM helpers ---
const TOOL_ICONS = {
  Read: '\uD83D\uDCC4', Write: '\u270F\uFE0F', Edit: '\u270F\uFE0F',
  Bash: '\uD83D\uDCBB', Glob: '\uD83D\uDD0D', Grep: '\uD83D\uDD0E',
  thinking: '\uD83D\uDCAC',
};

function addMessage(text, type) {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'message message-' + type;
  if (type === 'assistant') {
    el.innerHTML = renderMarkdown(text);
  } else {
    el.textContent = text;
  }
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function createToolContainer() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'tool-activity';
  chat.appendChild(el);
  return el;
}

function addToolItem(container, name, detail, isThinking) {
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'tool-item';
  const icon = TOOL_ICONS[name] || '\u2699\uFE0F';
  el.innerHTML = '<span class="tool-icon">' + icon + '</span>' +
    '<span class="tool-name">' + escapeHtml(name) + '</span>' +
    (detail ? '<span class="tool-detail">' + escapeHtml(detail) + '</span>' : '');
  container.appendChild(el);
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function addStreamingIndicator() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'streaming-indicator';
  el.innerHTML = '<div class="streaming-dot"></div> Claude is working...';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function renderMarkdown(text) {
  // Minimal markdown: code blocks, inline code, bold, italic
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g,
    '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Input handling ---
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

async function newSession() {
  if (isStreaming) return;
  const { data } = await supabase.auth.getSession();
  if (data.session) session = data.session;
  const token = session?.access_token;
  if (!token) return;

  try {
    await fetch(API_BASE + '/web/new', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
    });
    currentSessionId = null;
    updateSessionBadge();
    document.getElementById('chat').innerHTML = '';
  } catch (err) {
    console.error('Failed to clear session:', err);
  }
}
</script>
</body>
</html>
